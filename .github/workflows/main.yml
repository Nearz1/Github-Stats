name: Generate Stats Images

on:
  push:
    branches: 
      - master
  schedule:
    - cron: "5 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

defaults:
  run:
    shell: bash -euxo pipefail {0}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Zig
      uses: mlugg/setup-zig@v2
      with:
        version: 0.15.2

    - name: Build
      run: zig build --release

    - name: Checkout history branch
      run: |
        git config --global user.name "github-stats"
        git config --global user.email "github-stats@users.noreply.github.com"
        git fetch origin generated || true
        git checkout generated || git checkout -b generated

    - name: Generate images
      run: |
        ./zig-out/bin/github-stats --access-token $ACCESS_TOKEN
      env:
        ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        EXCLUDE_REPOS: ${{ secrets.EXCLUDE_REPOS }}
        EXCLUDE_LANGS: ${{ secrets.EXCLUDE_LANGS }}
        EXCLUDE_PRIVATE: "false"
        DEBUG: "false"
        MAX_RETRIES: 5

    - name: Commit and push
      run: |
        git add .
        git commit -m "Update generated files" || true
        git push origin generated
